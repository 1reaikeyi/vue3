<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浪漫烟花之夜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to bottom, #0a0a2e, #16213e, #0a3460);
      overflow: hidden;
      font-family: Arial, sans-serif;
      cursor: crosshair;
    }

    #canvas {
      display: block;
      background: transparent;
    }

    .blessing {
      position: absolute;
      color: #fff;
      font-size: 60px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.9);
      pointer-events: none;
      animation: fadeOut 3s ease-out forwards;
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-50px);
      }
    }
  </style>
</head>


<body>
<canvas id="canvas"></canvas>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');


  // 设置画布大小
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // 烟花粒子类
  class Particle {
    constructor(x, y, color, type = 'normal') {
      this.x = x;
      this.y = y;
      this.color = color;
      this.type = type;

      if (type === 'rocket') {
        this.vx = 0;
        this.vy = -Math.random() * 8 - 8;
      } else {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
      }

      this.size = Math.random() * 3 + 1;
      this.life = 1;
      this.decay = Math.random() * 0.02 + 0.01;
      this.gravity = 0.1;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.life -= this.decay;
      this.size *= 0.99;
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();

      // 发光效果
      ctx.shadowBlur = 10;
      ctx.shadowColor = this.color;
      ctx.fill();
      ctx.restore();
    }
  }

  // 烟花类
  class Firework {
    constructor(x, y, targetY) {
      this.x = x;
      this.y = y;
      this.targetY = targetY;
      this.particles = [];
      this.exploded = false;
      this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
      this.rocket = new Particle(x, y, this.color, 'rocket');
    }

    update() {
      if (!this.exploded) {
        this.rocket.update();
        if (this.rocket.vy >= 0 || this.rocket.y <= this.targetY) {
          this.explode();
        }
      }

      for (let i = this.particles.length - 1; i >= 0; i--) {
        this.particles[i].update();
        if (this.particles[i].life <= 0) {
          this.particles.splice(i, 1);
        }
      }
    }

    explode() {
      this.exploded = true;
      const particleCount = Math.random() * 50 + 50;

      for (let i = 0; i < particleCount; i++) {
        this.particles.push(new Particle(this.rocket.x, this.rocket.y, this.color));
      }

      // 显示祝福语
      const blessings = [
        '碎碎安',
        '碎碎平',
        '平平安安',
        '岁岁平安',
        '新的一年,加油',
        '阖家幸福',
        '前程似锦',
        '财运亨通',
        '万事顺意',
        '福气满满',
        '好运连连'
      ];
      const blessing = blessings[Math.floor(Math.random() * blessings.length)];
      this.showBlessing(blessing);
    }

    showBlessing(text) {
      const div = document.createElement('div');
      div.className = 'blessing';
      div.textContent = text;
      div.style.left = this.rocket.x + 'px';
      div.style.top = this.rocket.y + 'px';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }

    draw() {
      if (!this.exploded) {
        this.rocket.draw();
      }
      this.particles.forEach(particle => particle.draw());
    }

    isDead() {
      return this.exploded && this.particles.length === 0;
    }
  }

  // 烟花管理
  const fireworks = [];

  // 点击发射烟花
  canvas.addEventListener('click', (e) => {
    const x = e.clientX;
    const y = e.clientY;
    const targetY = Math.max(0, y - 100); // 向上发射100像素
    fireworks.push(new Firework(x, y, targetY));
  });

  // 动画循环
  function animate() {
    ctx.fillStyle = 'rgba(10, 10, 46, 0.1)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 更新和绘制烟花
    for (let i = fireworks.length - 1; i >= 0; i--) {
      fireworks[i].update();
      fireworks[i].draw();
      if (fireworks[i].isDead()) {
        fireworks.splice(i, 1);
      }
    }

    requestAnimationFrame(animate);
  }

  // 开始动画
  animate();
</script>
</body>
</html>
