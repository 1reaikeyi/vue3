<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    dt {
        display: inline-block;
        width: 100px; /* 可根据需求调整宽度 */
        padding: 5px;
        border: 1px solid #ddd; /* 边框用于演示，可删除 */
    }
   
</style>

</head>
<body>
    <strong>没序号</strong>
    <ul>
        <li>列表1</li>
        <li>列表2</li>
        <li>列表3</li>
        <li>列表4</li>
    </ul>
    <strong>有序号</strong>
    <ol>
        <li>步骤1</li>
        <li>步骤2</li>
        <li>步骤3</li>
        <li>步骤4</li>
        <li>步骤5</li>
    </ol>
    <strong>列表</strong>
    <dl>
        <dt>服务中心</dt><dt>标题</dt>
        <dd>申请售后</dd><dd>联系我们</dd>
        <dt>welcome</dt><dt>标题</dt>
        <dd>售后中心</dd><dd>加入我们</dd>
    </dl>

   
</body>
</html>
