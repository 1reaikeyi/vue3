<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div id="vue">
    <h1>{{message}}</h1>
    <h2>{{message}}</h2>
</div>

<script type="module">
    import { createApp } from 'https://cdn.staticfile.org/vue/3.4.21/vue.esm-browser.js';
    createApp({
        // 定义响应式数据
        data() {
            return {
                message: '你好，app！'
            }
        }
    }).mount("#vue");
</script>
</body>
</html>
