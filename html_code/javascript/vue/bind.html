<!DOCTYPE html>
<html lang="en" xmlns:v-bind="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div id="app">
    <a v-bind:href="url">官网</a>
</div>

<script type="module">
    //引入vue模块
    import { createApp} from
            'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    //创建vue应用实例
    createApp({
        data() {
            return {
                url:"https://www.douyin.com"
            }
        }
    }).mount("#app")
</script>

</body>
</html>
