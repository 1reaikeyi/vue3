<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            text-decoration: none;
        }
        .p1{
            text-decoration: underline;
        }
        .p2{
            text-decoration: line-through;
        }
        .p3{
            text-decoration: overline;
        }

        
    </style>
</head>
<body>
    <a href="#">去除下滑线</a>
    <p class="p1">添加下划线</p>
    <p class="p2">添加删除线</p>
    <p class="p3">添加上划线</p>
</body>
</html>
